name: GitHub Classroom — automatic notebook grading

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  grade:
    name: Grade five training notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out submission
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare training data
        run: python scripts/prepare_data.py

      - name: Execute and grade notebooks
        run: python grading/grade_all.py --ci

      - name: Publish score in workflow summary
        if: always()
        shell: bash
        run: |
          if [ -f grade_report.md ]; then
            cat grade_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Grading failed before a report could be produced" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload detailed grading report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: notebook-grade-report
          path: |
            grade_report.md
            grade_report.json
            grade_outputs/
          if-no-files-found: warn
          retention-days: 30
